volumes:
  redis-data:
  bff-project-target:

networks:
  backend:
  user_backend:
    external: true
    name: ${USER_BACKEND_NETWORK:-bff_user_backend}

secrets:
  npmrc:
    file: .npmrc
  npm_token:
    environment: NODE_AUTH_TOKEN

x-common-env: &common-env
  HOST: "0.0.0.0"
  PORT: 4001
  REDIS_URL: redis://redis:6379
  DB_TYPE: postgres
  DB_NAME: mairie_360_database
  DB_USER: postgres
  DB_HOST: ${SHARED_DB_HOST:-mairie360-db-bff-user}
  DB_PASSWORD: password
  DB_PORT: 5432

x-depends-on: &depends-on
  redis:
    condition: service_healthy

# x-healthcheck: &healthcheck
#   test: ["CMD", "curl", "-f", "http://localhost:4001"]
#   interval: 10s
#   timeout: 5s
#   retries: 5

x-service: &service-template
  image: ghcr.io/mairie360/service_name:latest
  pull_policy: always
  restart: always
  expose:
    - "4001"
  networks:
    - backend
  # healthcheck:
  #   <<: *healthcheck

services:
  redis:
    image: redis:8.4.0-bookworm
    container_name: mairie360-redis-project-bff #change bff name
    restart: always
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # core:
  #   container_name: core-project-bff-developpement
  #   image: ghcr.io/mairie360/core-api:1.0.0
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - backend
  #   dns:
  #     - 8.8.8.8
  #     - 1.1.1.1
  #   environment:
  #     HOST: "0.0.0.0"
  #     PORT: 3000
  #     REDIS_URL: redis://redis:6379
  #     DB_TYPE: postgres
  #     DB_NAME: mairie_360_database
  #     DB_USER: postgres
  #     DB_HOST: postgres
  #     DB_PASSWORD: password
  #     DB_PORT: 5432
  #     PUBLIC_URL: http://core.development.mairie360.fr
  #     JWT_SECRET: b"secret"
  #     JWT_TIMEOUT: 3600
  #   depends_on:
  #     liquibase:
  #       condition: service_completed_successfully
  #     redis:
  #       condition: service_healthy

  project-api:
    container_name: project-api-bff-project-developpement
    image: ghcr.io/mairie360/project-api:dev-89c9730
    ports:
      - "3001:3001"
    networks:
      - backend
      - user_backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      HOST: "0.0.0.0"
      PORT: 3001
      REDIS_URL: redis://redis:6379
      DB_TYPE: postgres
      DB_NAME: mairie_360_database
      DB_USER: postgres
      DB_HOST: ${SHARED_DB_HOST:-mairie360-db-bff-user}
      DB_PASSWORD: password
      DB_PORT: 5432
      PUBLIC_URL: http://project.development.mairie360.fr
      JWT_SECRET: b"secret"
      JWT_TIMEOUT: 3600
    depends_on:
      redis:
        condition: service_healthy

  #add other apis if needed

  bff-project:
    container_name: bff-project-developpement
    build:
      context: .
      dockerfile: development.Dockerfile
      secrets:
        - npmrc
        - npm_token
    # Mode synchronisation en temps réel (Docker Compose V2)
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: package.json
    ports:
      - "4001:4001"
    networks:
      - backend
      - user_backend
    environment:
      <<: *common-env
      # IMPORTANT : On utilise le nom du service Docker pour communiquer
      CORE_API_URL: "core-bff-user-developpement"
      CORE_API_PORT: 3000
      PROJECT_API_URL: "project-api"
      PROJECT_API_PORT: 3001
      PROJECT_API_BASE_PATH: "http://project-api:3001"
      USER_BFF_URL: "http://bff-user-developpement:4000"
    volumes:
      - /app/node_modules # Isolation des modules pour éviter les conflits OS (Mac/Windows vs Linux)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

